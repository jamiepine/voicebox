name: Generate SBOM
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: /backend
          format: spdx-json
      - uses: anchore/sbom-action@v0
        with:
          path: /app
          format: spdx-json
