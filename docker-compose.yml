services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      # Bind to localhost only for security
      - "127.0.0.1:17493:17493"

    volumes:
      # Bind-mount for generated audio (customize the host path as needed)
      # Host side:      ./output/
      # Container side: /app/data/generations/
      - ./output:/app/data/generations

      # Named volume for profiles, DB, cache (persists across container restarts)
      - voicebox-data:/app/data

      # HuggingFace model cache (so models aren't re-downloaded on rebuild)
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info

    networks:
      - voicebox-net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  mcp:
    build:
      context: mcp
    container_name: voicebox-mcp
    restart: unless-stopped

    ports:
      - "127.0.0.1:3100:3100"

    environment:
      - VOICEBOX_URL=http://voicebox:17493
      - VOICEBOX_MCP_TRANSPORT=http
      - VOICEBOX_MCP_HOST=0.0.0.0
      - VOICEBOX_MCP_PORT=3100

    depends_on:
      - voicebox

    networks:
      - voicebox-net

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache:
