[project]
name = "voicebox-backend"
version = "0.2.3"
requires-python = ">=3.12"

# ---------------------------------------------------------------------------
# Ruff – linter + formatter
# ---------------------------------------------------------------------------

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["."]

# Files/dirs to skip entirely.
extend-exclude = [
    "voicebox-server.spec",
    "build_binary.py",
    # PyInstaller runtime hooks — auto-generated, unconventional by design.
    "pyi_rth_*.py",
]

[tool.ruff.lint]
select = [
    "F",     # pyflakes
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "I",     # isort
    "N",     # pep8-naming
    "UP",    # pyupgrade (modernize syntax for 3.12)
    "B",     # flake8-bugbear
    "A",     # flake8-builtins (shadowing built-in names)
    "SIM",   # flake8-simplify
    "T20",   # flake8-print (flag print() calls)
    "RET",   # flake8-return
    "PIE",   # misc lints
    "PT",    # flake8-pytest-style
    "RUF",   # ruff-specific rules
    "ERA",   # commented-out code detection
    "FIX",   # flag TODO/FIXME/HACK/XXX for review
]

ignore = [
    # Allow print() in existing code -- remove items from this list as files
    # are migrated to logging during the refactor.
    "T201",   # print() found

    # These conflict with the formatter or are too noisy during migration:
    "E501",   # line too long (formatter handles this)
    "RET504", # unnecessary assignment before return
    "SIM108", # use ternary operator (sometimes less readable)
    "B008",   # function call in default argument (FastAPI Depends() pattern)
    "UP007",  # use X | Y for union (auto-fixed by UP, but noisy on big diffs)

    # Ambiguous unicode in docstrings/strings — intentional in user-facing copy.
    "RUF001", # ambiguous unicode character in string
    "RUF002", # ambiguous unicode character in docstring
]

# Per-file rule overrides.
[tool.ruff.lint.per-file-ignores]
# Tests can use assert, print, and magic values freely.
"tests/**" = ["S101", "T201", "PLR2004", "ERA001", "N806", "RUF001", "RUF034", "SIM117", "PT011", "E402", "RUF012", "SIM115"]
# __init__.py re-exports are expected to have unused imports.
"**/__init__.py" = ["F401"]
# Entry points and scripts legitimately use print.
"server.py" = ["T201", "N806", "SIM115", "E402"]
"main.py" = ["T201"]
# AMD GPU env vars must be set before torch import.
"app.py" = ["E402", "RUF012"]
# seed.py passes SQLAlchemy model classes as arguments (PascalCase is correct for models).
"database/seed.py" = ["N803"]
# Routes and utils use ALL_CAPS local constants (intentional naming convention).
"routes/generations.py" = ["N806"]
"routes/history.py" = ["N806"]
"routes/profiles.py" = ["N806"]
"utils/hf_progress.py" = ["N806", "SIM102", "B007"]
# Backends require deliberate import ordering (patches must run before other imports).
"backends/__init__.py" = ["E402", "ERA001", "UP035"]
"backends/mlx_backend.py" = ["E402", "SIM102"]
"backends/pytorch_backend.py" = ["E402"]
"backends/hume_backend.py" = ["ERA001"]
"backends/qwen_custom_voice_backend.py" = ["ERA001"]

[tool.ruff.lint.isort]
known-first-party = ["backend"]
# Group "from backend.*" imports into the first-party section.
force-single-line = false
combine-as-imports = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

# Marker declarations so pytest does not warn about unknown marks.
markers = [
    "unit: fast, pure-logic tests with no I/O",
    "integration: tests using real SQLite DB or filesystem (no external network)",
]
